name: iOS Build

on:
  push:
    branches: [ main, cytrus-libretro-core-final ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Build Core
        run: |
          make -f Makefile.libretro platform=ios -j$(sysctl -n hw.ncpu)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cytrus_libretro_ios
          path: cytrus_libretro_ios.dylib
