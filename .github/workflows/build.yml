name: Build Libretro Core

on:
  push:
    branches: [ main, libretro-static-ir-hle-optimized ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      IOS_MIN_VERSION: "15.0"  # ←ここで指定
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Initialize submodules
      run: |
        git submodule update --init --depth 1 libretro/libretro-common
        git submodule update --init --depth 1 libretro/azahar
        git submodule update --init --depth 1 libretro/externals/openssl
        git -C libretro/azahar submodule update --init --recursive --depth 1

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.1'

    - name: Build
      run: |
        set -x
        make -f Makefile.libretro PLATFORM=ios IOS_MIN_VERSION=${IOS_MIN_VERSION} V=1 -j$(sysctl -n hw.ncpu)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cytrus_libretro_ios
        path: |
          cytrus_libretro_ios.dylib
          cytrus_libretro.info

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        submodules: false

    - name: Initialize submodules
      run: |
        git submodule update --init --depth 1 libretro/libretro-common
        git submodule update --init --depth 1 libretro/azahar
        git submodule update --init --depth 1 libretro/externals/openssl
        git -C libretro/azahar submodule update --init --recursive --depth 1

    - name: Install dependencies
      run: |
        set -x
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev

    - name: Build
      run: |
        set -x
        make -f Makefile.libretro V=1 -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cytrus_libretro_linux
        path: |
          cytrus_libretro.so
          cytrus_libretro.info
